name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build debug
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go 1.26.4
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: frpc-stcp-visitor-go/go.sum

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic

      - name: Install Android SDK components
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Prepare frp
        working-directory: frpc-stcp-visitor-go
        shell: bash
        run: go run ./cmd/preparefrp

      - name: Audit community and documentation metadata
        shell: bash
        run: python3 .github/scripts/audit-community.py

      - name: Audit third-party and legal inventory
        shell: bash
        run: python3 .github/scripts/audit-third-party.py

      - name: Run Go race tests
        working-directory: frpc-stcp-visitor-go
        shell: bash
        run: go test -race -modfile=build/frp-patched.mod ./...

      - name: Run patched frp client race tests
        working-directory: frpc-stcp-visitor-go/build/frp-v0.69.1-p1
        shell: bash
        run: go test -race ./client/...

      - name: Build and validate GoMobile bridge
        shell: bash
        run: bash frpc-stcp-visitor-go/build-aar.sh

      - name: Run Android tests and build debug APKs
        shell: bash
        run: >-
          bash ./gradlew --no-daemon
          :frpc-stcp-visitor:checkGoMobileBridgeAar
          :app:testDebugUnitTest
          :frpc-stcp-visitor:testDebugUnitTest
          :app:assembleDebug
          -PrequireGoMobileBridge=true
