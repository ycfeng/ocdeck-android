name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release version
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check version and tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            bash .github/scripts/check-release-version.sh "$GITHUB_REF_NAME"
          else
            [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
              printf 'manual release dry-run must use the main branch\n' >&2
              exit 1
            }
            bash .github/scripts/check-release-version.sh
          fi

      - name: Audit community and documentation metadata
        shell: bash
        run: python3 .github/scripts/audit-community.py

  prepare-notes:
    name: Prepare release notes
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Assemble release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
          REPOSITORY_URL: https://github.com/ycfeng/ocdeck-android
          VERSION_NAME: ${{ needs.preflight.outputs.version_name }}
        run: |
          set -euo pipefail
          version_notes="release-notes/v${VERSION_NAME}.md"
          [[ -f "$version_notes" ]] || {
            printf 'missing curated release notes: %s\n' "$version_notes" >&2
            exit 1
          }

          python3 - "$REPOSITORY_URL" "$RELEASE_TAG" "$version_notes" "$GITHUB_EVENT_NAME" <<'PY'
          from pathlib import Path
          import sys

          repository_url, release_tag, version_notes_path, event_name = sys.argv[1:]
          preamble_path = Path(".github/release-notes-preamble.md")
          preamble = preamble_path.read_text(encoding="utf-8")
          required = ("{{REPOSITORY_URL}}", "{{RELEASE_TAG}}")
          missing = [placeholder for placeholder in required if placeholder not in preamble]
          if missing:
              raise SystemExit(f"release-notes preamble is missing placeholders: {', '.join(missing)}")

          preamble = preamble.replace("{{REPOSITORY_URL}}", repository_url)
          preamble = preamble.replace("{{RELEASE_TAG}}", release_tag)
          curated = Path(version_notes_path).read_text(encoding="utf-8")
          notes = f"{preamble.rstrip()}\n\n{curated.rstrip()}\n"
          if event_name != "push":
              notes += (
                  "\n## Automatically generated changes / 自动生成变更\n\n"
                  "The automatic change list is appended only when a real release tag is published. "
                  "This manual dry run did not call GitHub generate-notes. / "
                  "自动变更列表只在真实 release tag 发布时追加；本次手动 dry-run 未调用 "
                  "GitHub generate-notes。\n"
              )
          Path("release-notes.md").write_text(notes, encoding="utf-8", newline="\n")
          PY

          python3 - release-notes.md <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")
          forbidden = re.search(r"(?<![A-Za-z0-9_])(TODO|TBD)(?![A-Za-z0-9_])", text, re.IGNORECASE)
          unresolved = re.search(r"\{\{[^{}\n]+\}\}", text)
          changes_headings = re.findall(r"^##[ \t]+Changes(?:[ \t]*/[^\n]*)?[ \t]*$", text, re.IGNORECASE | re.MULTILINE)
          if forbidden:
              raise SystemExit(f"release notes contain prohibited marker: {forbidden.group(1)}")
          if unresolved:
              raise SystemExit(f"release notes contain unresolved placeholder: {unresolved.group(0)}")
          if len(changes_headings) > 1:
              raise SystemExit("release notes contain duplicate '## Changes' headings")
          if not text.endswith("\n"):
              raise SystemExit("release notes must end with a newline")
          PY

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            generated_notes=$(gh api \
              --method POST \
              "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              --jq '.body')
            [[ -n "$generated_notes" ]] || {
              printf 'GitHub generate-notes returned an empty body for %s\n' "$RELEASE_TAG" >&2
              exit 1
            }
            printf '\n%s\n' "$generated_notes" >> release-notes.md
          fi

      - name: Upload prepared release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocdeck-${{ needs.preflight.outputs.version_name }}-release-notes
          path: release-notes.md
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
          overwrite: false
          include-hidden-files: false

  build-release:
    name: Build and verify signed release
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: release
    permissions:
      contents: read
    env:
      ORG_GRADLE_PROJECT_PROJECT_URL: https://github.com/ycfeng/ocdeck-android

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go 1.26.4
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: frpc-stcp-visitor-go/go.sum

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic
          cache-read-only: true

      - name: Install Android SDK components
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Prepare frp
        working-directory: frpc-stcp-visitor-go
        shell: bash
        run: go run ./cmd/preparefrp

      - name: Audit third-party and legal inventory
        shell: bash
        run: python3 .github/scripts/audit-third-party.py

      - name: Run Go race tests
        working-directory: frpc-stcp-visitor-go
        shell: bash
        run: go test -race -modfile=build/frp-patched.mod ./...

      - name: Run patched frp client race tests
        working-directory: frpc-stcp-visitor-go/build/frp-v0.69.1-p1
        shell: bash
        run: go test -race ./client/...

      - name: Verify reproducible GoMobile bridge
        shell: bash
        run: bash .github/scripts/verify-bridge-reproducibility.sh

      - name: Run Android tests and build verification APKs
        shell: bash
        run: >-
          bash ./gradlew --no-daemon
          :frpc-stcp-visitor:checkGoMobileBridgeAar
          :app:testDebugUnitTest
          :app:testCanaryUnitTest
          :frpc-stcp-visitor:testDebugUnitTest
          :app:assembleDebug
          :app:assembleCanary
          -PrequireGoMobileBridge=true

      - name: Decode release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          [[ -n "$RELEASE_KEYSTORE_BASE64" ]]
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          chmod 600 "$RUNNER_TEMP/release.jks"
          [[ -s "$RUNNER_TEMP/release.jks" ]]

      - name: Build signed APKs
        shell: bash
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: >-
          bash ./gradlew --no-daemon
          :app:validateReleaseSigning
          :app:assembleRelease
          -PrequireGoMobileBridge=true

      - name: Verify and stage release assets
        shell: bash
        env:
          RELEASE_CERT_SHA256: ${{ vars.RELEASE_CERT_SHA256 }}
        run: >-
          bash .github/scripts/verify-release-artifacts.sh
          "${{ needs.preflight.outputs.version_name }}"
          "${{ needs.preflight.outputs.version_code }}"
          "$RELEASE_CERT_SHA256"
          "$RUNNER_TEMP/release-assets"

      - name: Upload verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocdeck-${{ needs.preflight.outputs.version_name }}-release
          path: ${{ runner.temp }}/release-assets/
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Remove release keystore
        if: always()
        shell: bash
        run: rm -f "$RUNNER_TEMP/release.jks"

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - preflight
      - prepare-notes
      - build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocdeck-${{ needs.preflight.outputs.version_name }}-release
          path: release-assets

      - name: Download prepared release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocdeck-${{ needs.preflight.outputs.version_name }}-release-notes
          path: prepared-notes

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
          VERSION_NAME: ${{ needs.preflight.outputs.version_name }}
        run: |
          set -euo pipefail
          [[ -f prepared-notes/release-notes.md ]]
          prerelease_args=()
          if [[ "$VERSION_NAME" == 0.* ]]; then
            prerelease_args+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" \
            release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file prepared-notes/release-notes.md \
            "${prerelease_args[@]}"
