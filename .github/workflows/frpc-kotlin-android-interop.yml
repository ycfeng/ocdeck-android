name: K6V Android STCP Interop

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Full 40-character commit SHA to validate
        required: true
        type: string
  workflow_call:
    inputs:
      candidate_sha:
        description: Full 40-character commit SHA to validate
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: k6v-frpc-android-${{ inputs.candidate_sha }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate exact candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      candidate_sha: ${{ steps.candidate.outputs.candidate_sha }}
      tree_sha: ${{ steps.candidate.outputs.tree_sha }}

    steps:
      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify candidate and workflow identity
        id: candidate
        shell: bash
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            printf 'candidate_sha must be a lowercase 40-character commit SHA\n' >&2
            exit 1
          }
          [[ "$CANDIDATE_SHA" == "$GITHUB_SHA" ]] || {
            printf 'candidate_sha does not match github.sha\n' >&2
            exit 1
          }
          [[ "$CANDIDATE_SHA" == "$WORKFLOW_SHA" ]] || {
            printf 'candidate_sha does not contain the workflow being executed\n' >&2
            exit 1
          }
          checked_out=$(git rev-parse HEAD)
          [[ "$checked_out" == "$CANDIDATE_SHA" ]] || {
            printf 'checked-out HEAD does not match candidate_sha\n' >&2
            exit 1
          }
          tree_sha=$(git rev-parse 'HEAD^{tree}')
          printf 'candidate_sha=%s\n' "$checked_out" >> "$GITHUB_OUTPUT"
          printf 'tree_sha=%s\n' "$tree_sha" >> "$GITHUB_OUTPUT"

      - name: Set up Go 1.26.4
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: frpc-stcp-visitor-go/go.sum

      - name: Prepare frp
        working-directory: frpc-stcp-visitor-go
        shell: bash
        run: go run ./cmd/preparefrp

      - name: Audit community and documentation metadata
        shell: bash
        run: python3 .github/scripts/audit-community.py

      - name: Audit third-party and legal inventory
        shell: bash
        run: python3 .github/scripts/audit-third-party.py

  android-interop:
    name: Android API ${{ matrix.api-level }} x86_64
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        api-level:
          - 26
          - 36

    steps:
      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.candidate_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go 1.26.4
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: frpc-stcp-visitor-go/go.sum

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic
          cache-read-only: true

      - name: Install Android SDK and emulator image
        shell: bash
        env:
          API_LEVEL: ${{ matrix.api-level }}
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          SYSTEM_IMAGE="system-images;android-${API_LEVEL};default;x86_64"
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" \
            "platform-tools" \
            "emulator" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "$SYSTEM_IMAGE"

      - name: Build pinned GoMobile bridge
        shell: bash
        run: bash frpc-stcp-visitor-go/build-aar.sh

      - name: Create and start clean emulator
        id: emulator
        shell: bash
        env:
          API_LEVEL: ${{ matrix.api-level }}
        run: |
          set -euo pipefail
          [[ -c /dev/kvm ]] || {
            printf '/dev/kvm is unavailable on this runner\n' >&2
            exit 1
          }
          sudo chmod 0666 /dev/kvm
          adb start-server
          mapfile -t existing_emulators < <(adb devices | awk '$1 ~ /^emulator-/ { print $1 }')
          [[ ${#existing_emulators[@]} -eq 0 ]] || {
            printf 'runner already has an emulator attached\n' >&2
            exit 1
          }
          AVD_NAME="k6v-api-${API_LEVEL}"
          EMULATOR_PORT=5554
          SERIAL="emulator-${EMULATOR_PORT}"
          SYSTEM_IMAGE="system-images;android-${API_LEVEL};default;x86_64"
          AVDMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager"
          EMULATOR="$ANDROID_SDK_ROOT/emulator/emulator"
          printf 'no\n' | "$AVDMANAGER" create avd \
            --force \
            --name "$AVD_NAME" \
            --package "$SYSTEM_IMAGE" \
            --device pixel_2
          "$EMULATOR" \
            -avd "$AVD_NAME" \
            -port "$EMULATOR_PORT" \
            -accel on \
            -no-window \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -no-metrics \
            -gpu swiftshader_indirect \
            -camera-back none \
            -camera-front none \
            -wipe-data \
            >"$RUNNER_TEMP/k6v-emulator-${API_LEVEL}.log" 2>&1 &
          emulator_pid=$!
          printf 'emulator_pid=%s\n' "$emulator_pid" >> "$GITHUB_OUTPUT"
          for _ in $(seq 1 180); do
            kill -0 "$emulator_pid" 2>/dev/null || {
              printf 'owned emulator process exited before boot completed\n' >&2
              exit 1
            }
            if adb devices | awk -v serial="$SERIAL" '$1 == serial && $2 == "device" { found=1 } END { exit !found }'; then
              boot_completed=$(adb -s "$SERIAL" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [[ "$boot_completed" == "1" ]]; then
                break
              fi
            fi
            sleep 2
          done
          [[ "$(adb -s "$SERIAL" shell getprop sys.boot_completed | tr -d '\r')" == "1" ]] || {
            printf 'emulator did not finish booting\n' >&2
            exit 1
          }
          actual_api=$(adb -s "$SERIAL" shell getprop ro.build.version.sdk | tr -d '\r')
          actual_abi=$(adb -s "$SERIAL" shell getprop ro.product.cpu.abi | tr -d '\r')
          [[ "$actual_api" == "$API_LEVEL" && "$actual_abi" == "x86_64" ]] || {
            printf 'emulator API or ABI does not match the requested lane\n' >&2
            exit 1
          }
          adb -s "$SERIAL" shell settings put global window_animation_scale 0
          adb -s "$SERIAL" shell settings put global transition_animation_scale 0
          adb -s "$SERIAL" shell settings put global animator_duration_scale 0
          printf 'serial=%s\n' "$SERIAL" >> "$GITHUB_OUTPUT"

      - name: Run real GoMobile then Kotlin Android interop
        id: interop
        continue-on-error: true
        shell: bash
        env:
          DEVICE_SERIAL: ${{ steps.emulator.outputs.serial }}
        run: >-
          bash ./gradlew --no-daemon
          :frpc-stcp-visitor:frpcAndroidInteropTest
          -PrequireGoMobileBridge=true
          "-Pocdeck.frp.androidInterop.deviceSerial=${DEVICE_SERIAL}"

      - name: Write bounded lane evidence
        if: always()
        shell: bash
        env:
          API_LEVEL: ${{ matrix.api-level }}
          CANDIDATE_SHA: ${{ needs.preflight.outputs.candidate_sha }}
          TREE_SHA: ${{ needs.preflight.outputs.tree_sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          DEVICE_SERIAL: ${{ steps.emulator.outputs.serial }}
          INTEROP_OUTCOME: ${{ steps.interop.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "lane-evidence"
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import subprocess
          import tempfile
          import tomllib
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from pathlib import Path


          root = Path.cwd()
          sdk = Path(os.environ["ANDROID_SDK_ROOT"])
          api = int(os.environ["API_LEVEL"])
          serial = os.environ.get("DEVICE_SERIAL", "")
          maximum_command_output = 64 * 1024


          def command_text(
              command: list[str],
              timeout: int,
              standard_input: bytes | None = None,
          ) -> tuple[int, str]:
              if standard_input is not None and len(standard_input) > 16 * 1024:
                  return -1, ""
              with tempfile.TemporaryFile() as output:
                  process = subprocess.Popen(
                      command,
                      stdin=subprocess.PIPE if standard_input is not None else subprocess.DEVNULL,
                      stdout=output,
                      stderr=subprocess.STDOUT,
                  )
                  try:
                      process.communicate(input=standard_input, timeout=timeout)
                      return_code = process.returncode
                  except subprocess.TimeoutExpired:
                      process.kill()
                      process.communicate(timeout=5)
                      return -1, ""
                  size = output.tell()
                  if size > maximum_command_output:
                      return return_code, ""
                  output.seek(0)
                  return return_code, output.read(maximum_command_output + 1).decode("utf-8", errors="replace")


          def adb_property(name: str) -> str:
              if not serial:
                  return "unavailable"
              return_code, output = command_text(
                  [str(sdk / "platform-tools" / "adb"), "-s", serial, "shell", "getprop", name],
                  15,
              )
              value = output.strip()
              return value if return_code == 0 and value else "unavailable"


          def command_first_line(command: list[str]) -> str:
              return_code, text = command_text(command, 30)
              output = [line.strip() for line in text.splitlines() if line.strip()]
              return output[0] if return_code == 0 and output else "unavailable"


          def command_prefixed_line(command: list[str], prefix: str) -> str:
              return_code, text = command_text(command, 30)
              output = [line.strip() for line in text.splitlines() if line.strip()]
              return next(
                  (line for line in output if line.startswith(prefix)),
                  "unavailable",
              ) if return_code == 0 else "unavailable"


          def file_sha256(path: Path) -> str:
              if not path.is_file() or path.is_symlink():
                  return "unavailable"
              digest = hashlib.sha256()
              with path.open("rb") as stream:
                  for chunk in iter(lambda: stream.read(64 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()


          image_package = f"system-images;android-{api};default;x86_64"
          package_xml = sdk / "system-images" / f"android-{api}" / "default" / "x86_64" / "package.xml"
          image_revision = "unavailable"
          if package_xml.is_file():
              revision = ET.parse(package_xml).getroot().find(".//revision")
              if revision is not None:
                  parts = [revision.findtext(name, "0") for name in ("major", "minor", "micro")]
                  image_revision = ".".join(parts)

          versions = tomllib.loads((root / "gradle" / "libs.versions.toml").read_text(encoding="utf-8"))["versions"]
          frp_inventory = json.loads((root / "third_party" / "sources" / "frp.json").read_text(encoding="utf-8"))
          linux_asset = next(
              asset
              for asset in frp_inventory["interopHarnessReleaseAssets"]["assets"]
              if asset["platform"] == "linux_amd64"
          )
          gradle_home = Path(os.environ.get("GRADLE_USER_HOME", str(Path.home() / ".gradle")))
          archive = gradle_home / "caches" / "ocdeck" / "frp-interop" / "v0.69.1" / linux_asset["file"]
          actual_archive_sha = file_sha256(archive)

          bridge_properties = {}
          for raw_line in (root / "frpc-stcp-visitor-go" / "bridge-versions.properties").read_text(
              encoding="utf-8",
          ).splitlines():
              line = raw_line.strip()
              if line and not line.startswith("#") and "=" in line:
                  key, value = line.split("=", 1)
                  bridge_properties[key.strip()] = value.strip()
          bridge_version = bridge_properties.get("BRIDGE_VERSION", "")
          bridge_aar = (
              root
              / "frpc-stcp-visitor-go"
              / "build"
              / "repo"
              / "io"
              / "github"
              / "ycfeng"
              / "ocdeck"
              / "frpc-stcp-visitor-gobridge"
              / bridge_version
              / f"frpc-stcp-visitor-gobridge-{bridge_version}.aar"
          )
          test_apk = (
              root
              / "frpc-stcp-visitor"
              / "build"
              / "outputs"
              / "apk"
              / "androidTest"
              / "debug"
              / "frpc-stcp-visitor-debug-androidTest.apk"
          )

          page_size = "unavailable"
          if serial:
              page_size_script = (
                  'while read key value unit rest; do '
                  'case "$key" in KernelPageSize:|MMUPageSize:) '
                  'case "$unit" in kB) echo $((value * 1024)); exit 0;; '
                  'B) echo "$value"; exit 0;; esac;; esac; '
                  'done < /proc/self/smaps; exit 1'
              )
              return_code, output = command_text(
                  [str(sdk / "platform-tools" / "adb"), "-s", serial, "shell", "-T", "sh"],
                  15,
                  page_size_script.encode("utf-8"),
              )
              if return_code == 0 and output.strip().isdigit():
                  page_size = output.strip()

          evidence = {
              "schemaVersion": 1,
              "candidateSha": os.environ["CANDIDATE_SHA"],
              "treeSha": os.environ["TREE_SHA"],
              "workflowSha": os.environ["WORKFLOW_SHA"],
              "runUrl": os.environ["RUN_URL"],
              "runId": os.environ["GITHUB_RUN_ID"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "eventName": os.environ["GITHUB_EVENT_NAME"],
              "ref": os.environ["GITHUB_REF"],
              "recordedAtUtc": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "runnerOs": os.environ.get("RUNNER_OS", "unavailable"),
              "runnerImage": os.environ.get("ImageOS", "unavailable"),
              "runnerImageVersion": os.environ.get("ImageVersion", "unavailable"),
              "jdkVersion": command_first_line(["java", "--version"]),
              "gradleVersion": command_prefixed_line([str(root / "gradlew"), "--version"], "Gradle "),
              "agpVersion": str(versions["agp"]),
              "kotlinVersion": str(versions["kotlin"]),
              "emulatorApi": api,
              "emulatorRelease": adb_property("ro.build.version.release"),
              "emulatorAbi": adb_property("ro.product.cpu.abi"),
              "emulatorPageSize": page_size,
              "emulatorFingerprint": adb_property("ro.build.fingerprint"),
              "emulatorVersion": command_first_line([str(sdk / "emulator" / "emulator"), "-version"]),
              "systemImagePackage": image_package,
              "systemImageRevision": image_revision,
              "frpVersion": frp_inventory["interopHarnessReleaseAssets"]["version"],
              "frpArchive": linux_asset["file"],
              "frpExpectedSha256": linux_asset["sha256"],
              "frpActualSha256": actual_archive_sha,
              "testApkSha256": file_sha256(test_apk),
              "bridgeAarSha256": file_sha256(bridge_aar),
              "interopOutcome": os.environ.get("INTEROP_OUTCOME", "skipped"),
              "backendOrder": ["gomobile", "kotlin"],
              "scenario": "wire=v1 encryption=false compression=false",
              "testCommand": ":frpc-stcp-visitor:frpcAndroidInteropTest -PrequireGoMobileBridge=true",
          }
          output = root / "lane-evidence" / f"api-{api}.json"
          output.write_text(json.dumps(evidence, indent=2, sort_keys=True) + "\n", encoding="utf-8", newline="\n")
          PY

      - name: Upload lane evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6v-frpc-android-api-${{ matrix.api-level }}
          path: lane-evidence/api-${{ matrix.api-level }}.json
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Stop emulator
        if: always()
        shell: bash
        env:
          DEVICE_SERIAL: ${{ steps.emulator.outputs.serial }}
          EMULATOR_PID: ${{ steps.emulator.outputs.emulator_pid }}
        run: |
          if [[ -n "$DEVICE_SERIAL" ]]; then
            adb -s "$DEVICE_SERIAL" emu kill >/dev/null 2>&1 || true
          fi
          if [[ -n "$EMULATOR_PID" ]]; then
            kill "$EMULATOR_PID" >/dev/null 2>&1 || true
          fi

      - name: Enforce Android interop result
        if: always()
        shell: bash
        env:
          INTEROP_OUTCOME: ${{ steps.interop.outcome }}
        run: |
          [[ "$INTEROP_OUTCOME" == "success" ]] || {
            printf 'Android interop did not pass for API %s\n' '${{ matrix.api-level }}' >&2
            exit 1
          }

  acceptance-report:
    name: Render K6V acceptance report
    if: always() && needs.preflight.result == 'success'
    needs:
      - preflight
      - android-interop
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.candidate_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download lane evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: k6v-frpc-android-api-*
          path: lane-evidence

      - name: Render bilingual exact-SHA report
        id: report
        continue-on-error: true
        shell: bash
        run: >-
          python3 .github/scripts/render-frpc-android-interop-report.py
          --evidence-directory lane-evidence
          --output-directory acceptance-report
          --candidate-sha '${{ needs.preflight.outputs.candidate_sha }}'
          --tree-sha '${{ needs.preflight.outputs.tree_sha }}'
          --workflow-sha '${{ github.workflow_sha }}'
          --matrix-result '${{ needs.android-interop.result }}'
          --expected-api 26
          --expected-api 36

      - name: Upload K6V acceptance report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6v-frpc-android-interop-${{ needs.preflight.outputs.candidate_sha }}
          path: acceptance-report
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Enforce complete K6V evidence
        if: always()
        shell: bash
        env:
          MATRIX_RESULT: ${{ needs.android-interop.result }}
          REPORT_OUTCOME: ${{ steps.report.outcome }}
        run: |
          [[ "$MATRIX_RESULT" == "success" && "$REPORT_OUTCOME" == "success" ]] || {
            printf 'K6V Android interop evidence is incomplete or failed\n' >&2
            exit 1
          }
