name: Bug report / 缺陷报告
description: Report a reproducible OC Deck defect / 报告可复现的 OC Deck 缺陷
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve OC Deck. Search existing issues before submitting.

        感谢您帮助改进 OC Deck。提交前请先搜索已有 issue。

        **Never include / 严禁包含：** token, API key, password, cookie, SSH private key, private-key passphrase, host fingerprint, complete configuration, sensitive provider header, private URL, project source code, or complete server response；token、API key、密码、cookie、SSH 私钥、私钥口令、主机指纹、完整配置、Provider 敏感请求头、非公开 URL、项目源码或完整服务器响应。

        Report security vulnerabilities only through [GitHub Private Vulnerability Reporting](https://github.com/ycfeng/ocdeck-android/security/advisories/new). Do not disclose vulnerability details here.

        安全漏洞仅通过 [GitHub 私密漏洞报告](https://github.com/ycfeng/ocdeck-android/security/advisories/new)提交，不得在此披露漏洞细节。

  - type: input
    id: bug_app_version
    attributes:
      label: OC Deck version or commit / OC Deck 版本或 commit
      description: Use the app version shown in the app, or the tested commit hash. / 填写 App 中显示的版本，或测试所用 commit hash。
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true

  - type: input
    id: bug_android_version
    attributes:
      label: Android version / Android 版本
      description: Include the API level when known. / 已知时请包含 API level。
      placeholder: "Android 15 / API 35"
    validations:
      required: true

  - type: dropdown
    id: bug_abi
    attributes:
      label: Device ABI / 设备 ABI
      options:
        - arm64-v8a
        - armeabi-v7a
        - x86_64
        - Unknown / 未知
        - Not applicable / 不适用
    validations:
      required: true

  - type: input
    id: bug_server_version
    attributes:
      label: OpenCode Server version / OpenCode Server 版本
      description: Enter Unknown or Not applicable when appropriate. / 无法获知或不适用时填写 Unknown 或 Not applicable。
      placeholder: "1.17.7, Unknown, or Not applicable"
    validations:
      required: true

  - type: dropdown
    id: bug_connection_mode
    attributes:
      label: Connection mode / 连接模式
      options:
        - Direct / 直连
        - SSH
        - STCP
        - Not applicable / 不适用
    validations:
      required: true

  - type: textarea
    id: bug_summary
    attributes:
      label: Summary / 问题摘要
      description: Describe the defect in one or two clear paragraphs. / 用一到两段清晰描述缺陷。
    validations:
      required: true

  - type: textarea
    id: bug_reproduction
    attributes:
      label: Reproduction steps or scenario / 复现步骤或场景
      description: Provide the smallest repeatable sequence and any relevant preconditions. / 提供可重复的最小步骤及相关前置条件。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: bug_expected
    attributes:
      label: Expected behavior / 预期行为
    validations:
      required: true

  - type: textarea
    id: bug_actual
    attributes:
      label: Actual behavior / 实际行为
    validations:
      required: true

  - type: textarea
    id: bug_logs
    attributes:
      label: Redacted logs or screenshots / 已脱敏日志或截图
      description: Optional. Remove private data before attaching anything. / 可选。附加任何内容前必须移除非公开数据。
      render: shell

  - type: checkboxes
    id: bug_log_confirmation
    attributes:
      label: Log handling confirmation / 日志处理确认
      options:
        - label: I confirm that every attached log is redacted, or that I attached no logs. / 我确认所有附加日志均已脱敏，或未附加日志。
          required: true

  - type: checkboxes
    id: bug_sensitive_confirmation
    attributes:
      label: Sensitive information confirmation / 敏感信息确认
      options:
        - label: I confirm this report contains none of the prohibited sensitive information listed above. / 我确认本报告不包含上方列出的任何禁用敏感信息。
          required: true
