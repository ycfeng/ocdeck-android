name: Question / 问题咨询
description: Ask a non-security OC Deck usage or development question / 咨询非安全类 OC Deck 使用或开发问题
title: "[Question] "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Support is best-effort and has no guaranteed response time. Search existing issues and documentation first.

        支持仅为尽力而为，不保证响应时间。请先搜索已有 issue 和文档。

        **Never include / 严禁包含：** token, API key, password, cookie, SSH private key, private-key passphrase, host fingerprint, complete configuration, sensitive provider header, private URL, project source code, or complete server response；token、API key、密码、cookie、SSH 私钥、私钥口令、主机指纹、完整配置、Provider 敏感请求头、非公开 URL、项目源码或完整服务器响应。

        Report security vulnerabilities only through [GitHub Private Vulnerability Reporting](https://github.com/ycfeng/ocdeck-android/security/advisories/new). Do not disclose vulnerability details here.

        安全漏洞仅通过 [GitHub 私密漏洞报告](https://github.com/ycfeng/ocdeck-android/security/advisories/new)提交，不得在此披露漏洞细节。

  - type: input
    id: question_app_version
    attributes:
      label: OC Deck version or commit / OC Deck 版本或 commit
      description: Use the version relevant to the question. / 填写与问题相关的版本。
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true

  - type: input
    id: question_android_version
    attributes:
      label: Android version / Android 版本
      description: Include the API level when known. / 已知时请包含 API level。
      placeholder: "Android 15 / API 35"
    validations:
      required: true

  - type: dropdown
    id: question_abi
    attributes:
      label: Device ABI / 设备 ABI
      options:
        - arm64-v8a
        - armeabi-v7a
        - x86_64
        - Unknown / 未知
        - Not applicable / 不适用
    validations:
      required: true

  - type: input
    id: question_server_version
    attributes:
      label: OpenCode Server version / OpenCode Server 版本
      description: Enter Unknown or Not applicable when appropriate. / 无法获知或不适用时填写 Unknown 或 Not applicable。
      placeholder: "1.17.7, Unknown, or Not applicable"
    validations:
      required: true

  - type: dropdown
    id: question_connection_mode
    attributes:
      label: Connection mode / 连接模式
      options:
        - Direct / 直连
        - SSH
        - STCP
        - Not applicable / 不适用
    validations:
      required: true

  - type: textarea
    id: question_context
    attributes:
      label: Question and scenario / 问题与场景
      description: State the question, goal, relevant steps, and what is unclear. / 说明问题、目标、相关步骤及不清楚之处。
    validations:
      required: true

  - type: textarea
    id: question_attempts
    attributes:
      label: What have you tried? / 已尝试的方法
      description: Include documentation or troubleshooting already checked. / 填写已经查阅的文档或完成的排查。
    validations:
      required: true

  - type: textarea
    id: question_logs
    attributes:
      label: Redacted logs or screenshots / 已脱敏日志或截图
      description: Optional. Remove private data before attaching anything. / 可选。附加任何内容前必须移除非公开数据。
      render: shell

  - type: checkboxes
    id: question_log_confirmation
    attributes:
      label: Log handling confirmation / 日志处理确认
      options:
        - label: I confirm that every attached log is redacted, or that I attached no logs. / 我确认所有附加日志均已脱敏，或未附加日志。
          required: true

  - type: checkboxes
    id: question_sensitive_confirmation
    attributes:
      label: Sensitive information confirmation / 敏感信息确认
      options:
        - label: I confirm this question contains none of the prohibited sensitive information listed above. / 我确认本问题不包含上方列出的任何禁用敏感信息。
          required: true
